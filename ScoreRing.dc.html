<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;flex:none;width:{{px}};height:{{px}}">
  <sc-if value="{{isRing}}" hint-placeholder-val="{{true}}">
    <svg width="{{size}}" height="{{size}}" style="display:block;transform:rotate(-90deg)">
      <defs>
        <linearGradient id="{{gid}}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8B5CF6"></stop>
          <stop offset="55%" stop-color="#9B7BD0"></stop>
          <stop offset="100%" stop-color="#B8963E"></stop>
        </linearGradient>
      </defs>
      <circle cx="{{mid}}" cy="{{mid}}" r="{{r}}" fill="none" stroke="#ECE8F4" stroke-width="{{stroke}}"></circle>
      <circle cx="{{mid}}" cy="{{mid}}" r="{{r}}" fill="none" stroke="{{strokeUrl}}" stroke-width="{{stroke}}" stroke-linecap="round" stroke-dasharray="{{dash}}" stroke-dashoffset="{{progOff}}" style="transition:stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)"></circle>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;line-height:1"><span style="font-weight:700;color:#1E1145;font-size:{{numPx}};font-family:Montserrat,system-ui,sans-serif">{{score}}</span></div>
  </sc-if>
  <sc-if value="{{isBadge}}" hint-placeholder-val="{{false}}">
    <div style="width:{{px}};height:{{px}};border-radius:{{badgeRadius}};background:linear-gradient(135deg,#8B5CF6 0%,#B8963E 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 14px -5px rgba(139,92,246,.55)"><span style="font-weight:700;color:#fff;font-size:{{numPx}};font-family:Montserrat,system-ui,sans-serif">{{score}}</span></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:72,&quot;height&quot;:72},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:94,&quot;tsType&quot;:&quot;number&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:64,&quot;tsType&quot;:&quot;number&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Ring&quot;,&quot;options&quot;:[&quot;Ring&quot;,&quot;Badge&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { filled: false };
  componentDidMount() {
    const reduce = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { this.setState({ filled: true }); return; }
    requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ filled: true })));
  }
  renderVals() {
    const size = Number(this.props.size ?? 56);
    const score = Number(this.props.score ?? 0);
    const stroke = Math.max(3, Math.round(size / 11));
    const r = (size - stroke) / 2;
    const c = 2 * Math.PI * r;
    const off = c * (1 - Math.max(0, Math.min(100, score)) / 100);
    if (!this._gid) this._gid = 'sr' + Math.random().toString(36).slice(2, 8);
    const variant = this.props.variant || 'Ring';
    return {
      size, score, stroke, r,
      mid: size / 2,
      dash: c + ' ' + c,
      off,
      gid: this._gid,
      progOff: this.state.filled ? off : c,
      strokeUrl: 'url(#' + this._gid + ')',
      px: size + 'px',
      numPx: Math.round(size * 0.36) + 'px',
      isRing: variant !== 'Badge',
      isBadge: variant === 'Badge',
      badgeRadius: Math.round(size * 0.28) + 'px',
    };
  }
}
</script>
</body>
</html>
